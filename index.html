<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#14532d"><meta name="apple-mobile-web-app-capable" content="yes"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icon-192.png"><title>Six Sigma Green Belt - Bilingual</title>
<style>
:root{--bg:#0f172a;--panel:#111827;--brand:#16a34a;--accent:#38bdf8;--soft:#f8fafc;--ink:#111827;--line:#e5e7eb;--muted:#64748b}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;background:var(--soft);color:var(--ink);line-height:1.72}header{background:radial-gradient(circle at 15% 20%,#166534,var(--bg) 58%);color:white;padding:30px 16px;position:relative;overflow:hidden}header:after{content:"6σ";position:absolute;inset:auto 4% -70px auto;font-size:190px;font-weight:900;opacity:.06}.wrap{max-width:1180px;margin:auto}h1{font-size:clamp(28px,4vw,48px);margin:0 0 8px;line-height:1.2}.subtitle{max-width:900px;color:#dbeafe;font-size:17px}.actions,.row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.actions{margin-top:14px}button{font-family:inherit;border:1px solid var(--line);background:white;padding:9px 13px;border-radius:12px;cursor:pointer;font-weight:750;color:#111827;white-space:nowrap}.primary,button.active{background:var(--brand);color:white;border-color:#15803d}.blue{background:var(--accent);border-color:#0284c7}.danger{background:#fff1f2;color:#9f1239;border-color:#fecdd3}nav{position:sticky;top:0;z-index:20;background:#ffffffed;backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}nav .wrap{display:flex;gap:7px;padding:9px;overflow:auto}main{padding:20px 13px 60px}section{display:none}section.active{display:block}.grid{display:grid;gap:15px}.cols2{grid-template-columns:repeat(2,minmax(0,1fr))}@media(max-width:850px){.cols2{grid-template-columns:1fr}}.card{background:white;border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 6px 18px #0f172a0d}.darkCard{background:var(--panel);color:white;border-color:#334155}.between{justify-content:space-between}.muted{color:var(--muted)}.progress{height:12px;background:#e5e7eb;border-radius:99px;overflow:hidden}.progress>div{height:100%;background:linear-gradient(90deg,var(--brand),var(--accent));width:0}.calendar{display:grid;grid-template-columns:repeat(10,1fr);gap:8px}@media(max-width:950px){.calendar{grid-template-columns:repeat(5,1fr)}}@media(max-width:550px){.calendar{grid-template-columns:repeat(3,1fr)}}.dayBtn{min-height:72px;text-align:start;white-space:normal}.dayBtn.done{background:#dcfce7;border-color:#86efac}.dayBtn.current{outline:3px solid #bbf7d0}.dayNum{display:block;color:#15803d;font-weight:900}.callout{padding:13px;border-radius:14px;border-inline-start:5px solid var(--brand);background:#f0fdf4;margin:12px 0}.blueCall{border-color:var(--accent);background:#eff6ff}.warn{border-color:#f59e0b;background:#fffbeb}.term{display:inline-block;padding:4px 8px;margin:3px;border-radius:99px;border:1px solid var(--line);background:#f8fafc;direction:ltr}.q{padding:13px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;margin:13px 0}.q label{display:block;padding:8px;margin:6px 0;background:white;border:1px solid #eef2f7;border-radius:10px;cursor:pointer}.result{font-weight:700;margin-top:7px}.ok{color:#15803d}.bad{color:#be123c}input,select{font-family:inherit;padding:10px 12px;border:1px solid var(--line);border-radius:11px;background:white}input[type=number]{width:145px;direction:ltr}table{width:100%;border-collapse:collapse}th,td{border:1px solid var(--line);padding:10px;text-align:start}th{background:#f1f5f9}.template{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;padding:15px;border-radius:14px;text-align:left;direction:ltr}.flash{min-height:260px;display:flex;justify-content:center;align-items:center;text-align:center;font-size:25px;font-weight:850;cursor:pointer}body.dark{--soft:#07111f;--ink:#e5eef8;--line:#2c3d55}body.dark .card,body.dark nav,body.dark button,body.dark input,body.dark select,body.dark .q,body.dark .q label,body.dark .dayBtn{background:#101b2b;color:#e5eef8;border-color:#2c3d55}body.dark th{background:#16243a}body.dark .callout{background:#0d2b22}body.dark .blueCall{background:#10263c}body.dark .warn{background:#33280c}.ltr{direction:ltr;text-align:left}@media print{nav,.actions,.noPrint{display:none!important}section{display:none!important}section.active{display:block!important}.card{box-shadow:none}body{background:white}}
.languageToggle{font-size:15px;min-width:126px;border:2px solid #86efac;box-shadow:0 6px 18px #0000002b}.languageToggle:hover{transform:translateY(-1px)}</style></head><body>
<header><div class="wrap"><h1 id="title"></h1><div class="subtitle" id="subtitle"></div><div class="actions noPrint"><button class="primary languageToggle" id="langBtn" onclick="toggleLang()" aria-label="Switch language"></button><button id="darkBtn" onclick="toggleDark()"></button><button id="installBtn" onclick="installApp()" style="display:none"></button></div></div></header><nav><div class="wrap" id="nav"></div></nav><main class="wrap">
<section id="dash" class="active"><div class="grid cols2"><div class="card darkCard"><h2 id="progressTitle"></h2><div class="row between"><strong id="progressText"></strong><span id="progressPct"></span></div><div class="progress"><div id="progressFill"></div></div><div class="row noPrint" style="margin-top:14px"><button class="primary" onclick="tab('lessons')" id="startBtn"></button><button class="danger" onclick="resetProgress()" id="resetBtn"></button><button onclick="window.print()" id="printBtn"></button></div></div><div class="card"><h2 id="methodTitle"></h2><ol id="steps"></ol></div></div><div class="card" style="margin-top:15px"><h2 id="planTitle"></h2><div class="calendar" id="calendar"></div></div></section>
<section id="lessons"><div class="card noPrint"><div class="row"><button id="prevBtn" onclick="prevLesson()"></button><select id="lessonSelect" onchange="renderLesson(+this.value)"></select><button id="nextBtn" onclick="nextLesson()"></button><button class="blue" onclick="tab('weekly')" id="weekBtn"></button></div></div><div id="lessonView"></div></section>
<section id="weekly"><div class="card"><h2 id="weeklyTitle"></h2><div class="row noPrint" id="weekButtons"></div></div><div id="weeklyExam"></div></section>
<section id="lab"><div class="grid cols2"><div class="card"><h2>Yield / DPMO</h2><div class="row"><label>Opportunities <input id="opp" type="number" value="20000"></label><label>Defects <input id="def" type="number" value="100"></label><button class="primary calcBtn" onclick="calcSigma()"></button></div><div id="sigmaOut" class="callout blueCall"></div></div><div class="card"><h2>FMEA - RPN</h2><div class="row"><label>Severity <input id="sev" type="number" value="8"></label><label>Occurrence <input id="occ" type="number" value="4"></label><label>Detection <input id="det" type="number" value="5"></label><button class="primary calcBtn" onclick="calcRpn()"></button></div><div id="rpnOut" class="callout"></div></div><div class="card"><h2>Hypothesis Test</h2><div class="row"><label>p-value <input id="pval" type="number" step=".001" value=".03"></label><label>alpha <input id="alpha" type="number" step=".001" value=".05"></label><button class="primary calcBtn" onclick="calcHyp()"></button></div><div id="hypOut" class="callout warn"></div></div><div class="card"><h2>CoPQ</h2><div class="row"><label>Scrap <input id="scrap" type="number" value="5000"></label><label>Rework <input id="rework" type="number" value="12000"></label><label>Warranty <input id="warranty" type="number" value="8000"></label><button class="primary calcBtn" onclick="calcCopq()"></button></div><div id="copqOut" class="callout"></div></div></div><div class="card" style="margin-top:15px"><div id="formulaTable"></div></div></section>
<section id="templates"><div class="grid cols2" id="templateGrid"></div></section><section id="gloss"><div class="card"><input id="search" style="width:100%;margin-bottom:12px" oninput="renderGloss()"><div id="glossTable"></div></div></section>
<section id="cards"><div class="card"><p class="muted" id="cardHint"></p><div class="card flash" id="flash" onclick="flipCard()"></div><div class="row noPrint" style="justify-content:center;margin-top:12px"><button id="cardPrev" onclick="prevCard()"></button><button class="primary" onclick="flipCard()">↻</button><button id="cardNext" onclick="nextCard()"></button><button class="blue" id="shuffleBtn" onclick="shuffleCards()"></button></div><p class="muted" style="text-align:center" id="cardCount"></p></div></section>

<section id="final"><div class="card"><h2 id="finalTitle"></h2><p id="finalIntro"></p><button class="primary noPrint" id="finalStart" onclick="renderFinal()"></button></div><div id="finalExam"></div></section></main>
<script>
const COURSE={"ar": {"lessons": [{"day": 1, "week": 1, "title": "مدخل Six Sigma: القرار المبني على البيانات", "chapter": "الوحدة 1 - الفصل 1", "explain": ["Six Sigma منهج منظم لتقليل التباين والعيوب، وهو أيضاً مفهوم إحصائي لقياس أداء العملية.", "الخبرة والحدس مهمان، لكن المنهج يختبر الافتراضات بالبيانات قبل تعميم الحل."], "example": "تأخر الطلبات لا يعني تلقائياً ضعف الموظفين؛ قياس زمن كل خطوة قد يكشف أن السبب موافقة داخلية بطيئة.", "exercise": "اختر عملية وحدد المخرج والعيب وثلاث بيانات لإثبات المشكلة.", "terms": [["Variation", "التباين"], ["Defect", "عيب لا يحقق المتطلب"]], "quiz": [{"q": "ما الهدف الأساسي لـ Six Sigma؟", "options": ["زيادة التفتيش فقط", "تقليل التباين والعيوب بالبيانات", "إلغاء الخبرة", "زيادة الإجراءات"], "a": 1, "ex": "المنهج يركز على قياس التباين وتقليله."}, {"q": "متى يكون القرار ضعيفاً؟", "options": ["عند غياب القياس", "عند اختبار الحل", "عند تحليل البيانات", "عند قياس الأثر"], "a": 0, "ex": "الانطباع وحده لا يثبت السبب."}]}, {"day": 2, "week": 1, "title": "Yield وDPMO ومستوى السيغما", "chapter": "الوحدة 1 - تعريف 6σ", "explain": ["Yield هي نسبة النتائج السليمة من مجموع الفرص، بينما DPMO هو عدد العيوب لكل مليون فرصة.", "Six Sigma نظرياً تساوي نحو 3.4 عيب لكل مليون فرصة، لكن مستوى السيغما ليس معيار الأولوية الوحيد."], "example": "100 عيب من 20,000 فرصة تعني Yield=99.5% وDPMO=5,000.", "exercise": "احسب Yield وDPMO لعدد 12,000 فرصة و36 عيباً.", "terms": [["Yield", "نسبة السليم"], ["DPMO", "العيوب لكل مليون فرصة"]], "quiz": [{"q": "1,000 فرصة و10 عيوب تعطي Yield؟", "options": ["90%", "99%", "10%", "1%"], "a": 1, "ex": "(1000-10)/1000=99%."}, {"q": "لماذا نستخدم DPMO؟", "options": ["لتوحيد المقارنة", "لإلغاء القياس", "لقياس الرضا", "لأنه يساوي السيغما دائماً"], "a": 0, "ex": "يوحد القياس على مليون فرصة."}]}, {"day": 3, "week": 1, "title": "تاريخ Six Sigma", "chapter": "الوحدة 1 - الفصل 2", "explain": ["Shewhart ارتبط بخرائط التحكم، وDeming بدورة PDCA والتحسين المستمر.", "Toyota طورت Lean وJidoka وJust-in-Time، ثم وسعت Motorola وGE التطبيق وربطته بنتائج الأعمال."], "example": "الأدوات دون دعم قيادة قد تتوقف، ودعم القيادة دون بيانات قد يوجه الموارد إلى مشكلة خاطئة.", "exercise": "ارسم خطاً زمنياً لـ Shewhart وDeming وToyota وMotorola وGE.", "terms": [["SPC", "التحكم الإحصائي"], ["PDCA", "خطط-نفذ-تحقق-تصرف"]], "quiz": [{"q": "من يرتبط بخرائط التحكم؟", "options": ["Shewhart", "Amazon", "Minitab", "GE فقط"], "a": 0, "ex": "Shewhart من مؤسسي خرائط التحكم."}, {"q": "PDCA تعني؟", "options": ["Plan-Do-Check-Act", "Prepare-Define-Control-Analyze", "Process-Data-Cost-Act", "Plan-Design-Control-Audit"], "a": 0, "ex": "هي دورة تحسين مستمر."}]}, {"day": 4, "week": 1, "title": "متى تستخدم Six Sigma؟", "chapter": "الوحدة 1 - الفصل 3", "explain": ["Six Sigma تناسب مشكلة متكررة وقابلة للقياس ولها سبب غير واضح وأثر مهم.", "Lean يركز على الهدر والتدفق، وISO على نظام الإدارة والامتثال، وقد تحتاج بعض المشكلات إجراءً مباشراً لا مشروعاً كاملاً."], "example": "غياب مسؤول اعتماد واضح يحتاج قرار صلاحيات، أما تذبذب مدة الاعتماد عبر مئات الطلبات فيناسب DMAIC.", "exercise": "صنف ثلاث مشكلات إلى Six Sigma أو Lean أو إجراء إداري.", "terms": [["Lean", "تقليل الهدر"], ["Suitability", "ملاءمة المشكلة للمنهج"]], "quiz": [{"q": "أي مشكلة تناسب Six Sigma؟", "options": ["نقص طابعة", "تذبذب متكرر في زمن خدمة مع بيانات", "اختيار لون", "حادثة منفردة واضحة"], "a": 1, "ex": "هي متكررة وقابلة للقياس."}, {"q": "Lean يركز على؟", "options": ["الهدر والتدفق", "p-value فقط", "كتابة السياسة فقط", "التفتيش النهائي"], "a": 0, "ex": "الهدر والتدفق محوران أساسيان في Lean."}]}, {"day": 5, "week": 1, "title": "Lean: الهدر و5S", "chapter": "الوحدة 1 - الفصل 4", "explain": ["الهدر يشمل الانتظار والحركة والنقل والمخزون والإنتاج الزائد والمعالجة الزائدة والعيوب.", "5S تجعل بيئة العمل مرتبة ومعيارية بحيث يصبح الانحراف واضحاً وسهل التصحيح."], "example": "البحث المتكرر عن ملف اعتماد هو هدر انتظار وحركة ويمكن تقليله بتوحيد المجلدات والأسماء.", "exercise": "طبق 5S على مجلد أو مساحة عمل وحدد كيف ستحافظ على النظام.", "terms": [["Muda", "الهدر"], ["5S", "تنظيم واستدامة"]], "quiz": [{"q": "أي مثال يمثل Waiting؟", "options": ["انتظار توقيع", "مخزون زائد", "نقل متكرر", "إعادة عمل"], "a": 0, "ex": "الانتظار لا يضيف قيمة."}, {"q": "هدف 5S؟", "options": ["التجميل فقط", "تنظيم العمل وإظهار الانحراف", "زيادة النماذج", "إخفاء المشكلة"], "a": 1, "ex": "5S تجعل الوضع الصحيح واضحاً."}]}, {"day": 6, "week": 1, "title": "الانحراف المعياري وPareto وVOC", "chapter": "الوحدة 1 - الفصل 5", "explain": ["المتوسط لا يوضح اتساق العملية وحده؛ الانحراف المعياري يصف مقدار التشتت.", "Pareto يحدد القلة الأكثر تأثيراً، وVOC يتحول إلى CTQ عندما يصاغ كمتطلب قابل للقياس."], "example": "أريد رداً سريعاً تصبح: 90% من الطلبات تحصل على رد أول خلال ساعتين.", "exercise": "حول خمس شكاوى عامة إلى CTQs قابلة للقياس.", "terms": [["Pareto", "ترتيب الأسباب حسب الأثر"], ["CTQ", "خاصية حرجة للجودة"]], "quiz": [{"q": "لماذا لا يكفي المتوسط؟", "options": ["لا يظهر التشتت", "دائماً خطأ", "لا يستخدم أرقاماً", "يلغي العميل"], "a": 0, "ex": "قد يكون المتوسط جيداً والتباين مرتفعاً."}, {"q": "أفضل CTQ؟", "options": ["الخدمة ممتازة", "العميل سعيد", "95% خلال 24 ساعة", "نحسن بسرعة"], "a": 2, "ex": "محددة وقابلة للقياس."}]}, {"day": 7, "week": 1, "title": "صياغة المشكلة و5 Whys", "chapter": "الوحدة 1 - الفصل 6", "explain": ["y=f(x) تعني أن المخرج Y يتأثر بعوامل X داخل العملية.", "بيان المشكلة يصف ماذا وأين ومتى وكم والأثر، ولا يضع الحل داخله."], "example": "بدلاً من الموظفون لا يهتمون: 14% من الطلبات أعيدت بسبب مستند ناقص وأضافت ثلاثة أيام تأخير.", "exercise": "أعد صياغة جملة غامضة إلى Problem Statement مقاسة.", "terms": [["Y=f(X)", "المخرج دالة في العوامل"], ["5 Whys", "الوصول إلى السبب الجذري"]], "quiz": [{"q": "ماذا يمثل Y؟", "options": ["المخرج", "العامل", "اسم المشروع", "الرسم"], "a": 0, "ex": "Y هو النتيجة المطلوب تحسينها."}, {"q": "ما الخطأ في نحتاج نظاماً جديداً؟", "options": ["هي حل لا وصف مشكلة", "فيها أرقام", "تحدد زمناً", "تقيس الأثر"], "a": 0, "ex": "لا تضع الحل في بيان المشكلة."}]}, {"day": 8, "week": 2, "title": "فهم العملية باستخدام SIPOC", "chapter": "الوحدة 2 - الفصل 7", "explain": ["SIPOC يحدد المورد والمدخل والخطوات الرئيسية والمخرج والعميل على مستوى عالٍ.", "مالك العملية مسؤول عن الأداء اليومي واستدامة التحسين بعد انتهاء المشروع."], "example": "إعداد تقرير: مزود بيانات، بيانات معتمدة، جمع وتحليل ومراجعة، تقرير، إدارة مستفيدة.", "exercise": "ارسم SIPOC من 5 إلى 7 خطوات لعملية تعرفها.", "terms": [["SIPOC", "مورد-مدخل-عملية-مخرج-عميل"], ["Process Owner", "مالك العملية"]], "quiz": [{"q": "متى يستخدم SIPOC؟", "options": ["في بداية فهم النطاق", "بعد الإغلاق فقط", "بدلاً من كل البيانات", "للميزانية فقط"], "a": 0, "ex": "هو أداة تعريف عالية المستوى."}, {"q": "حرف C يعني؟", "options": ["Cost", "Control", "Customer", "Chart"], "a": 2, "ex": "C=Customer."}]}, {"day": 9, "week": 2, "title": "الجودة والتكلفة: CTQ وCoQ وCoPQ", "chapter": "الوحدة 2 - الفصل 8", "explain": ["الجودة تعني تحقيق المتطلبات الحرجة للعميل بصورة متكررة، وليس زيادة التفتيش فقط.", "CoPQ تشمل تكاليف إعادة العمل والهالك والشكاوى والضمان والتأخير."], "example": "عيب قبل التسليم قد يكلف ساعة، وبعد التسليم قد يحتاج زيارة وتعويضاً واستعادة ثقة العميل.", "exercise": "ضع مثالين لكل فئة: Prevention وAppraisal وInternal Failure وExternal Failure.", "terms": [["CoQ", "تكلفة الجودة"], ["CoPQ", "تكلفة ضعف الجودة"]], "quiz": [{"q": "أي مثال فشل خارجي؟", "options": ["تدريب", "فحص داخلي", "شكوى وتعويض بعد التسليم", "تحديث إجراء"], "a": 2, "ex": "وصل العيب إلى العميل."}, {"q": "لماذا الوقاية أفضل؟", "options": ["تمنع العيب قبل أن يصبح مكلفاً", "تزيد العيوب", "تلغي القياس", "تؤخر دائماً"], "a": 0, "ex": "التكلفة ترتفع مع تأخر الاكتشاف."}]}, {"day": 10, "week": 2, "title": "اختيار مشروع Six Sigma", "chapter": "الوحدة 2 - الفصل 9", "explain": ["المشروع الجيد له مشكلة واضحة وأثر وبيانات ونطاق ومالك داعم.", "مصفوفة الأثر والجهد والتوافق الاستراتيجي تساعد على ترتيب الأفكار ومنع توسع النطاق."], "example": "بدلاً من تحسين المشتريات: خفض مدة أمر شراء المواد المتكررة من 12 إلى 7 أيام خلال 4 أشهر.", "exercise": "قيم ثلاث أفكار من 1 إلى 5 في الأثر والبيانات والسهولة والدعم.", "terms": [["Business Case xample": "قفزة مفاجئة في الزمن بعد تعطل النظام تشير إلى سبب خاص.", "exercise": "ارسم 12 أسبوعاً لمؤشر وابحث عن نقطة خارجية أو اتجاه مستمر.", "terms": [["UCL/LCL", "حدود التحكم"], ["Special Cause", "سبب غير معتاد"]], "quiz": [{"q": "حدود التحكم تستخدم لـ؟", "options": ["تمييز الطبيعي عن غير الطبيعي", "اختيار اللون", "SIPOC", "RACI"], "a": 0, "ex": "تكشف إشارات عدم الاستقرار."}, {"q": "Common Cause؟", "options": ["تباين طبيعي داخل العملية", "حدث استثنائي", "حل التحسين", "خطأ شخصي دائماً"], "a": 0, "ex": "هو تباين متأصل في النظام."}]}, {"day": 21, "week": 4, "title": "التوزيع الطبيعي وZ-score", "chapter": "الوحدة 4 - الفصل 18", "explain": ["التوزيع الطبيعي جرسي ومتماثل تقريباً حول المتوسط، لكن يجب فحص Histogram والقيم الشاذة قبل افتراض الطبيعية.", "Z-score يبين بعد القيمة عن المتوسط بوحدة الانحراف المعياري."], "example": "متوسط 50 وانحراف 5 وقيمة 65 تعطي Z=3.", "exercise": "احسب Z للقيم 72 و80 و96 إذا كان المتوسط 80 والانحراف 8.", "terms": [["Normal Distribution", "التوزيع الطبيعي"], ["Z-score", "البعد عن المتوسط"]], "quiz": [{"q": "Z=0 يعني؟", "options": ["القيمة تساوي المتوسط", "خارج السيطرة", "أعلى بانحرافين", "لا تقاس"], "a": 0, "ex": "المسافة عن المتوسط صفر."}, {"q": "لماذا نفحص Histogram؟", "options": ["لفحص شكل التوزيع", "لاختيار Sponsor", "لـRPN", "للميثاق"], "a": 0, "ex": "يكشف الانحراف والقيم الشاذة."}]}, {"day": 22, "week": 4, "title": "الاحتمالات وCentral Limit Theorem", "chapter": "الوحدة 4 - الفصل 18", "explain": ["الاحتمال يساعد على اتخاذ قرار تحت عدم التأكد ولا يقدم يقيناً مطلقاً.", "CLT توضح أن توزيع متوسطات العينات يميل للطبيعية مع حجم عينة مناسب وشروط معينة."], "example": "خمس حالات من يوم مزدحم لا تمثل شهراً كاملاً من الأداء.", "exercise": "اشرح لماذا عينة من ثلاث حالات لا تكفي للحكم على عملية شهرية.", "terms": [["Probability", "احتمال"], ["CLT", "نظرية الحد المركزي"]], "quiz": [{"q": "CLT تتعلق بـ؟", "options": ["متوسطات العينات", "طبيعية كل فرد", "إلغاء العينات", "اختفاء العيوب"], "a": 0, "ex": "تركز على توزيع إحصاء العينة."}, {"q": "مشكلة العينة الصغيرة؟", "options": ["قد لا تمثل الواقع", "دائماً أفضل", "تلغي التحيز", "تثبت السبب"], "a": 0, "ex": "قد تتأثر بحالات استثنائية."}]}, {"day": 23, "week": 4, "title": "Correlation وRegression", "chapter": "الوحدة 4 - الفصل 19", "explain": ["معامل الارتباط r يقيس قوة واتجاه العلاقة الخطية، بينما Regression يبني معادلة لتقدير Y من X.", "الارتباط لا يثبت السببية؛ قد يوجد عامل ثالث يفسر المتغيرين."], "example": "قد يرتبط ضغط العمل بالتأخير، لكن يجب فحص عدد الموظفين ونوع الطلبات وتعطل النظام.", "exercise": "اكتب مثالين لعلاقة سببية محتملة ومثالين لعلاقة مضللة.", "terms": [["Correlation", "ارتباط"], ["Regression", "انحدار تنبؤي"]], "quiz": [{"q": "r=-0.85 يعني؟", "options": ["علاقة عكسية قوية", "لا علاقة", "طردية قوية", "بيانات اسمية"], "a": 0, "ex": "السالب اتجاه عكسي والقيمة الكبيرة قوة."}, {"q": "Correlation لا تثبت؟", "options": ["السببية", "الاتجاه", "وجود أرقام", "الرسم"], "a": 0, "ex": "قد يوجد عامل ثالث."}]}, {"day": 24, "week": 4, "title": "التوزيعات غير الطبيعية", "chapter": "الوحدة 5 - الفصل 20", "explain": ["عدد العيوب والنتائج الثنائية وأزمنة الانتظار قد تحتاج توزيعات غير طبيعية.", "Binomial لنجاح/فشل، Poisson لعدد أحداث، وExponential لزمن الانتظار بين أحداث."], "example": "فاتورة صحيحة أو خاطئة قد تناسب Binomial، وعدد الشكاوى يومياً قد يناسب Poisson.", "exercise": "صنف زمن الانتظار وعدد العيوب ونجاح/فشل والوزن حسب نوع البيانات.", "terms": [["Binomial", "نتائج ثنائية"], ["Poisson", "عدد أحداث"]], "quiz": [{"q": "Binomial يناسب؟", "options": ["نجاح/فشل", "حرارة مستمرة", "لون", "نص"], "a": 0, "ex": "يتعامل مع نتيجة ثنائية."}, {"q": "Poisson يناسب؟", "options": ["عدد أحداث في زمن", "متوسط فقط", "SIPOC", "فريق"], "a": 0, "ex": "مثل عدد الشكاوى يومياً."}]}, {"day": 25, "week": 4, "title": "Hypothesis Testing: H0 وp-value", "chapter": "الوحدة 5 - الفصل 21", "explain": ["H0 تعني عادة لا يوجد فرق أو أثر، وHa تعني يوجد فرق.", "إذا p-value أقل من أو تساوي alpha نرفض H0، وهذا قرار احتمالي لا يقين مطلق."], "example": "p=0.02 وalpha=0.05 تعني رفض H0 ووجود دليل إحصائي على فرق.", "exercise": "اكتب H0 وHa لسؤال: هل النظام الجديد قلل زمن المعالجة؟", "terms": [["H0", "الفرضية الصفرية"], ["p-value", "قيمة الاحتمال"]], "quiz": [{"q": "p=0.03 وalpha=0.05؟", "options": ["نرفض H0", "نقبل H0 كحقيقة", "نلغي البيانات", "نرفع alpha"], "a": 0, "ex": "لأن p≤alpha."}, {"q": "H0 تعني غالباً؟", "options": ["لا يوجد فرق", "يوجد فرق دائماً", "نجاح 100%", "العينة خطأ"], "a": 0, "ex": "تمثل الحالة الافتراضية."}]}, {"day": 26, "week": 4, "title": "اختيار اختبار الفرضيات", "chapter": "الوحدة 5 - الفصل 21", "explain": ["اختيار الاختبار يعتمد على نوع البيانات وعدد المجموعات وهل القياسات مرتبطة أم مستقلة.", "Paired لنفس العناصر قبل وبعد، وIndependent لمجموعات مختلفة، ويجب التفريق بين الدلالة الإحصائية والأهمية العملية."], "example": "نفس الموظفين قبل وبعد التدريب = Paired، وفرع A مقابل فرع B = Independent.", "exercise": "صنف خمسة أسئلة إلى paired أو independent أو categorical.", "terms": [["Paired Test", "قياسات مرتبطة"], ["Practical Significance", "أهمية عملية"]], "quiz": [{"q": "نفس الموظفين قبل وبعد؟", "options": ["Paired", "Independent دائماً", "SIPOC", "Pareto"], "a": 0, "ex": "القياسات مرتبطة."}, {"q": "الدلالة العملية تعني؟", "options": ["هل الفرق مهم فعلياً", "p-value فقط", "عدد الشرائح", "اللون"], "a": 0, "ex": "اربط النتيجة بالأثر."}]}, {"day": 27, "week": 4, "title": "حجم العينة وPower", "chapter": "الوحدة 5 - الفصل 22", "explain": ["العينة الصغيرة قد تفوت فرقاً حقيقياً، والكبيرة جداً قد تجعل فرقاً تافهاً دالاً إحصائياً.", "Power=1-Beta وتمثل قدرة الاختبار على اكتشاف فرق حقيقي."], "example": "خفض العيوب من 10% إلى 9.8% قد يحتاج عينة ضخمة لكنه قد لا يكون مهماً عملياً.", "exercise": "حدد أصغر فرق تعتبره مهماً لمؤشر واحد.", "terms": [["Power", "قوة الاختبار"], ["Effect Size", "حجم الأثر"]], "quiz": [{"q": "Power تعني؟", "options": ["قدرة اكتشاف فرق حقيقي", "تكلفة المشروع", "عدد الفريق", "السيغما"], "a": 0, "ex": "Power=1-Beta."}, {"q": "عينة صغيرة قد تؤدي إلى؟", "options": ["عدم اكتشاف فرق حقيقي", "ثقة مطلقة", "إلغاء التباين", "دقة بلا حدود"], "a": 0, "ex": "ترفع خطر Type II Error."}]}, {"day": 28, "week": 4, "title": "خرائط التحكم المتقدمة", "chapter": "الوحدة 5 - الفصل 23", "explain": ["I-MR وXbar-R للبيانات المستمرة، بينما p وnp وc وu للبيانات الوصفية أو العدّية.", "p-chart للنسبة مع تغير حجم العينة، وu-chart لعدد العيوب لكل وحدة مع تغير الفرص."], "example": "نسبة الطلبات الخاطئة أسبوعياً مع اختلاف العدد تناسب p-chart، وزمن كل طلب يناسب I-MR غالباً.", "exercise": "اختر خريطة مناسبة لستة مؤشرات متنوعة.", "terms": [["I-MR", "قياسات فردية مستمرة"], ["p-chart", "نسبة المعيب"]], "quiz": [{"q": "نسبة المعيب مع تغير الحجم؟", "options": ["p-chart", "np-chart", "SIPOC", "RACI"], "a": 0, "ex": "p-chart للنسب مع حجم متغير."}, {"q": "I-MR يناسب؟", "options": ["قياسات فردية مستمرة", "نجاح/فشل فقط", "عدد الموردين", "المهام"], "a": 0, "ex": "مثل زمن كل حالة."}]}, {"day": 29, "week": 4, "title": "عرض الإحصاء للإدارة", "chapter": "الوحدة 5 - الفصل 24", "explain": ["ابدأ بالمشكلة والأثر والسبب والحل والنتيجة، ثم قدم الدليل الإحصائي الداعم.", "لا تعرض p-value بلا معنى؛ اربط الدلالة بالتوفير أو العميل أو المخاطر وضع التفاصيل الفنية في ملحق."], "example": "انخفض الزمن من 4.8 إلى 2.9 يوم، والفرق مدعوم إحصائياً، والتوفير المتوقع 180 ساعة شهرياً.", "exercise": "حول نتيجة اختبار إلى ملخص تنفيذي من خمسة أسطر.", "terms": [["Business Impact", "أثر الأعمال"], ["Appendix", "ملحق فني"]], "quiz": [{"q": "أفضل بداية للعرض؟", "options": ["المشكلة والأثر والرسالة", "كل المعادلات", "تفاصيل البرنامج", "أسماء الملفات"], "a": 0, "ex": "القرار والسياق يأتيان أولاً."}, {"q": "الملحق يستخدم لـ؟", "options": ["التفاصيل الفنية دون تشتيت", "إخفاء النتائج", "إلغاء التوصية", "العنوان فقط"], "a": 0, "ex": "يحافظ على وضوح العرض."}]}, {"day": 30, "week": 4, "title": "المراجعة النهائية واستراتيجية الاختبار", "chapter": "مراجعة الوحدات 1-5", "explain": ["راجع منطق Six Sigma الكامل واربط كل أداة بمرحلتها وموقف استخدامها.", "الاختبار غالباً يقدم حالة عملية ويطلب أفضل أداة أو قرار، لذلك راجع تفسير الأخطاء لا الإجابة فقط."], "example": "أسباب كثيرة وتريد الأعلى تكراراً: Pareto. تنظيم أسباب محتملة: Fishbone. استدامة الحل: Control Plan.", "exercise": "أكمل الاختبار النهائي وسجل الدروس المرتبطة بأخطائك.", "terms": [["Tool Selection", "اختيار الأداة"], ["Exam Strategy", "استراتيجية الاختبار"]], "quiz": [{"q": "تثبيت التحسن؟", "options": ["Control", "Define", "Measure فقط", "Analyze فقط"], "a": 0, "ex": "Control تحافظ على النتيجة."}, {"q": "الأسباب الأعلى تكراراً؟", "options": ["Pareto", "RACI", "Charter", "DMADV"], "a": 0, "ex": "Pareto يرتب الفئات."}]}], "extras": [{"q": "قبل جمع بيانات كثيرة، ما الأهم؟", "options": ["تعريف المشكلة والعيب والنطاق", "شراء برنامج", "كتابة Control Plan", "الاحتفال"], "a": 0, "ex": "التعريف الواضح يمنع جمع بيانات غير مفيدة."}, {"q": "أفضل مخرج Analyze؟", "options": ["سبب جذري مثبت", "حلول بلا دليل", "خطة احتفال", "نطاق غامض"], "a": 0, "ex": "Analyze تثبت السبب."}, {"q": "أي مثال Special Cause؟", "options": ["تذبذب طبيعي", "تعطل نظام سبب قفزة", "اختلافات صغيرة", "نمط مستقر"], "a": 1, "ex": "حدث غير معتاد."}, {"q": "أي مثال Prevention Cost؟", "options": ["تدريب وتحسين إجراء", "إصلاح عيب", "تعويض عميل", "شحن بديل"], "a": 0, "ex": "الوقاية قبل وقوع العيب."}, {"q": "Tollgate Review؟", "options": ["مراجعة مرحلة قبل الانتقال", "اختبار الشهادة فقط", "خريطة تحكم", "حساب DPMO"], "a": 0, "ex": "تضمن اكتمال المخرجات."}, {"q": "خطر القفز إلى Improve؟", "options": ["علاج سبب غير مثبت", "إلغاء المخاطر", "تقوية Control", "تسريع دائم"], "a": 0, "ex": "الحل يصبح مبنياً على التخمين."}]}, "en": {"lessons": [{"day": 1, "week": 1, "title": "Introduction to Six Sigma: Data-Based Decisions", "chapter": "Unit 1 - Chapter 1", "explain": ["Six Sigma is a structured method for reducing variation and defects, and also a statistical concept for measuring process performance.", "Experience and intuition remain useful, but the method validates assumptions with data before full implementation."], "example": "Late orders do not automatically mean poor employee performance; measuring each step may reveal a slow internal approval.", "exercise": "Choose a process and define its output, one defect, and three data points needed to prove the problem.", "terms": [["Variation", "Differences in process output"], ["Defect", "Failure to meet a requirement"]], "quiz": [{"q": "What is the primary purpose of Six Sigma?", "options": ["Increase inspection only", "Reduce variation and defects using data", "Eliminate experience", "Add procedures"], "a": 1, "ex": "The method focuses on measuring and reducing variation."}, {"q": "When is a decision weak?", "options": ["When measurement is absent", "When a solution is piloted", "When data are analyzed", "When impact is measured"], "a": 0, "ex": "Opinion alone does not prove the cause."}]}, {"day": 2, "week": 1, "title": "Yield, DPMO, and Sigma Level", "chapter": "Unit 1 - Defining 6σ", "explain": ["Yield is the percentage of defect-free opportunities, while DPMO is the number of defects per one million opportunities.", "A theoretical Six Sigma process has about 3.4 defects per million opportunities, but sigma level is not the only project-priority criterion."], "example": "100 defects in 20,000 opportunities gives Yield=99.5% and DPMO=5,000.", "exercise": "Calculate Yield and DPMO for 12,000 opportunities and 36 defects.", "terms": [["Yield", "Percentage defect-free"], ["DPMO", "Defects per million opportunities"]], "quiz": [{"q": "What is the Yield for 1,000 opportunities and 10 defects?", "options": ["90%", "99%", "10%", "1%"], "a": 1, "ex": "(1000-10)/1000=99%."}, {"q": "Why use DPMO?", "options": ["To standardize comparison", "To remove measurement", "To measure satisfaction", "Because it always equals sigma"], "a": 0, "ex": "It standardizes defects on a one-million-opportunity basis."}]}, {"day": 3, "week": 1, "title": "Six Sigma History", "chapter": "Unit 1 - Chapter 2", "explain": ["Shewhart is associated with control charts, and Deming with PDCA and continuous improvement.", "Toyota developed Lean, Jidoka, and Just-in-Time; Motorola and GE expanded deployment and linked it to business results."], "example": "Tools without leadership support may stall, while sponsorship without data may target the wrong problem.", "exercise": "Draw a timeline for Shewhart, Deming, Toyota, Motorola, and GE.", "terms": [["SPC", "Statistical Process Control"], ["PDCA", "Plan-Do-Check-Act"]], "quiz": [{"q": "Who is associated with control charts?", "options": ["Shewhart", "Amazon", "Minitab", "GE only"], "a": 0, "ex": "Shewhart is a founder of control-chart theory."}, {"q": "What does PDCA mean?", "options": ["Plan-Do-Check-Act", "Prepare-Define-Control-Analyze", "Process-Data-Cost-Act", "Plan-Design-Control-Audit"], "a": 0, "ex": "It is a continuous-improvement cycle."}]}, {"day": 4, "week": 1, "title": "When Should You Use Six Sigma?", "chapter": "Unit 1 - Chapter 3", "explain": ["Six Sigma fits a recurring, measurable problem with uncertain causes and meaningful impact.", "Lean focuses on waste and flow, ISO on management-system compliance, and some issues require direct action rather than a full project."], "example": "No assigned approver needs a responsibility decision; highly variable approval time across hundreds of requests fits DMAIC.", "exercise": "Classify three problems as Six Sigma, Lean, or direct management action.", "terms": [["Lean", "Waste reduction"], ["Suitability", "Fit between problem and method"]], "quiz": [{"q": "Which problem fits Six Sigma?", "options": ["A missing printer", "Recurring variation in service time with data", "Choosing a color", "A clear one-time incident"], "a": 1, "ex": "It is recurring and measurable."}, {"q": "Lean focuses on...", "options": ["Waste and flow", "p-values only", "Policy writing only", "Final inspection"], "a": 0, "ex": "Waste and flow are core Lean concerns."}]}, {"day": 5, "week": 1, "title": "Lean: Waste and 5S", "chapter": "Unit 1 - Chapter 4", "explain": ["Waste includes waiting, motion, transportation, inventory, overproduction, overprocessing, and defects.", "5S organizes and standardizes the workplace so abnormalities become visible and easier to correct."], "example": "Repeatedly searching for an approval file is waiting and motion waste that can be reduced through standardized folders and names.", "exercise": "Apply 5S to a folder or workspace and define how the standard will be sustained.", "terms": [["Muda", "Waste"], ["5S", "Workplace organization and sustainment"]], "quiz": [{"q": "Which example is Waiting waste?", "options": ["Waiting for a signature", "Excess inventory", "Repeated transport", "Rework"], "a": 0, "ex": "Waiting adds no customer value."}, {"q": "What is the purpose of 5S?", "options": ["Appearance only", "Organize work and expose abnormalities", "Add forms", "Hide problems"], "a": 1, "ex": "5S makes the correct condition visible."}]}, {"day": 6, "week": 1, "title": "Standard Deviation, Pareto, and VOC", "chapter": "Unit 1 - Chapter 5", "explain": ["The mean alone does not show consistency; standard deviation describes spread.", "Pareto identifies the vital few, and VOC becomes a CTQ when expressed as a measurable requirement."], "example": "I need a fast response becomes: 90% of requests receive a first response within two hours.", "exercise": "Convert five broad complaints into measurable CTQs.", "terms": [["Pareto", "Ranking causes by impact"], ["CTQ", "Critical to Quality requirement"]], "quiz": [{"q": "Why is the mean not enough?", "options": ["It does not show spread", "It is always wrong", "It uses no numbers", "It removes the customer"], "a": 0, "ex": "The mean may look good while variation is high."}, {"q": "Which is the best CTQ?", "options": ["Excellent service", "Happy customer", "95% within 24 hours", "Improve quickly"], "a": 2, "ex": "It is specific and measurable."}]}, {"day": 7, "week": 1, "title": "Problem Statements and the 5 Whys", "chapter": "Unit 1 - Chapter 6", "explain": ["y=f(x) means output Y is influenced by process factors X.", "A Problem Statement defines what, where, when, how much, and the impact without embedding the solution."], "example": "Instead of employees do not care: 14% of requests were returned for a missing document, adding three days of delay.", "exercise": "Rewrite a vague complaint as a measurable Problem Statement.", "terms": [["Y=f(X)", "Output is a function of inputs"], ["5 Whys", "A root-cause questioning method"]], "quiz": [{"q": "What does Y represent?", "options": ["The output", "An input factor", "Project name", "A chart"], "a": 0, "ex": "Y is the result to be improved."}, {"q": "What is wrong with We need a new system?", "options": ["It is a solution, not a problem description", "It contains numbers", "It defines time", "It measures impact"], "a": 0, "ex": "Do not embed the solution in the Problem Statement."}]}, {"day": 8, "week": 2, "title": "Understanding the Process with SIPOC", "chapter": "Unit 2 - Chapter 7", "explain": ["SIPOC defines suppliers, inputs, high-level process steps, outputs, and customers.", "The Process Owner is accountable for daily performance and sustaining improvement after project closure."], "example": "Report preparation: data provider, approved data, collect-analyze-review, report, management customer.", "exercise": "Create a 5-to-7-step SIPOC for a familiar process.", "terms": [["SIPOC", "Supplier-Input-Process-Output-Customer"], ["Process Owner", "Person accountable for the process"]], "quiz": [{"q": "When is SIPOC used?", "options": ["At the start of scope understanding", "Only after closure", "Instead of all data", "For budgeting only"], "a": 0, "ex": "It is a high-level definition tool."}, {"q": "What does C stand for?", "options": ["Cost", "Control", "Customer", "Chart"], "a": 2, "ex": "C means Customer."}]}, {"day": 9, "week": 2, "title": "Quality and Cost: CTQ, CoQ, and CoPQ", "chapter": "Unit 2 - Chapter 8", "explain": ["Quality means consistently meeting critical customer requirements, not merely increasing inspection.", "CoPQ includes rework, scrap, complaints, warranty, and delay costs."], "example": "A defect before delivery may cost one hour; after delivery it may require a visit, compensation, and trust recovery.", "exercise": "List two examples for Prevention, Appraisal, Internal Failure, and External Failure.", "terms": [["CoQ", "Cost of Quality"], ["CoPQ", "Cost of Poor Quality"]], "quiz": [{"q": "Which is an external failure?", "options": ["Training", "Internal inspection", "Customer complaint and compensation", "Procedure update"], "a": 2, "ex": "The defect reached the customer."}, {"q": "Why is prevention better?", "options": ["It prevents defects before they become expensive", "It increases defects", "It removes measurement", "It always delays work"], "a": 0, "ex": "Cost usually rises as detection occurs later."}]}, {"day": 10, "week": 2, "title": "Selecting a Six Sigma Project", "chapter": "Unit 2 - Chapter 9", "explain": ["A strong project has a clear problem, meaningful impact, accessible data, controlled scope, and a supportive owner.", "Impact-effort analysis and strategic alignment help prioritize ideas and prevent scope creep."], "example": "Instead of improve purchasing: reduce repeat-material purchase-order lead time from 12 to 7 days within four months.", "exercise": "Score three ideas from 1 to 5 for impact, data, feasibility, and support.", "terms": [["Business Case", "Project justification"], ["Scope Creep", "Uncontrolled expansion"]], "quiz": [{"q": "Which is the strongest project statement?", "options": ["Improve the company", "Reduce invoice errors from 6% to 2% within three months", "Raise quality", "Solve all problems"], "a": 1, "ex": "It is specific and measurable."}, {"q": "What is the risk of scope creep?", "options": ["Loss of focus and time", "More focus", "No risk", "Customer definition"], "a": 0, "ex": "Uncontrolled expansion threatens the project."}]}, {"day": 11, "week": 2, "title": "Managing a Six Sigma Team", "chapter": "Unit 2 - Chapter 10", "explain": ["Project success depends on clear Sponsor, Process Owner, Green Belt, SME, and data-owner roles.", "RACI, milestones, and escalation routes prevent delay and duplication."], "example": "Delayed data should be handled with a due date, accountable owner, backup, and escalation - not passive waiting.", "exercise": "Build a RACI for a fictional project with five roles.", "terms": [["Sponsor", "Project sponsor"], ["RACI", "Responsible-Accountable-Consulted-Informed"]], "quiz": [{"q": "What is the Sponsor role?", "options": ["Remove obstacles and provide support", "Enter every data point", "Create only a histogram", "Write minutes"], "a": 0, "ex": "The Sponsor provides management support."}, {"q": "What is an SME?", "options": ["A subject/process expert", "A chart type", "A financial metric", "Software"], "a": 0, "ex": "An SME provides detailed subject knowledge."}]}, {"day": 12, "week": 2, "title": "DMAIC and DMADV", "chapter": "Unit 2 - Chapter 11", "explain": ["DMAIC improves an existing process: Define, Measure, Analyze, Improve, Control.", "DMADV designs a new process: Define, Measure, Analyze, Design, Verify, and Tollgates review phase deliverables."], "example": "A slow existing system fits DMAIC; a new platform designed from zero fits DMADV.", "exercise": "Write one key question that each DMAIC phase must answer.", "terms": [["DMAIC", "Improve an existing process"], ["DMADV", "Design a new process"]], "quiz": [{"q": "Where is the baseline established?", "options": ["Measure", "Improve", "Control", "Design"], "a": 0, "ex": "Measure defines current performance."}, {"q": "When is DMADV used?", "options": ["For new design", "For every small correction", "Without a customer", "Without data"], "a": 0, "ex": "DMADV is for design or major redesign."}]}, {"day": 13, "week": 2, "title": "Define: Project Charter and Scope", "chapter": "Unit 3 - Chapter 12", "explain": ["Define turns a problem into a formal project with a Problem Statement, Goal Statement, Business Case, scope, team, and schedule.", "The goal must be measurable and time-bound, while scope defines what is included and excluded."], "example": "Reduce returns of category A requests from 18% to 6% by the end of Q4 without increasing processing time.", "exercise": "Complete a one-page Project Charter using the template.", "terms": [["Project Charter", "Formal project definition"], ["Out of Scope", "Items excluded from the project"]], "quiz": [{"q": "A good goal is...", "options": ["Measurable and time-bound", "Vague", "Only a preferred solution", "Unrelated to the problem"], "a": 0, "ex": "Achievement must be verifiable."}, {"q": "Why define Out of Scope?", "options": ["Protect focus", "Expand the project", "Remove data", "Hide stakeholders"], "a": 0, "ex": "It prevents uncontrolled expansion."}]}, {"day": 14, "week": 2, "title": "Measure 1: FMEA and Data Types", "chapter": "Unit 3 - Chapter 13", "explain": ["Measure collects the data required to answer the project question, with a clear defect definition, unit, source, and owner.", "FMEA analyzes failure mode, effect, occurrence, and detectability, with RPN=S×O×D."], "example": "An incorrect tax number with S=8, O=4, and D=5 gives RPN=160.", "exercise": "Analyze five failure modes and calculate an RPN for each.", "terms": [["FMEA", "Failure Modes and Effects Analysis"], ["RPN", "Risk Priority Number"]], "quiz": [{"q": "What is the RPN formula?", "options": ["S+O+D", "S×O×D", "DPMO/Yield", "Cost×Time"], "a": 1, "ex": "Severity times Occurrence times Detection."}, {"q": "Time in minutes is what data type?", "options": ["Continuous", "Nominal only", "Opinion", "Color"], "a": 0, "ex": "Time is a continuous variable."}]}, {"day": 15, "week": 3, "title": "Measure 2: Baseline, Sampling, and Data Quality", "chapter": "Unit 3 - Chapter 13", "explain": ["The baseline is the performance reference before the solution; without it, improvement is difficult to prove.", "The sample must represent reality, and the data must be checked for definitions, missing values, duplicates, and outliers."], "example": "Approval lead time begins when the request enters the process, not when it reaches the manager after two hidden waiting days.", "exercise": "Write a data collection plan defining start, end, unit, sample, and exclusions.", "terms": [["Baseline", "Performance before improvement"], ["Bias", "Systematic sampling distortion"]], "quiz": [{"q": "Why is a baseline needed?", "options": ["To prove improvement", "To eliminate analysis", "Only to increase sample size", "To hide the problem"], "a": 0, "ex": "It is the comparison reference."}, {"q": "Which sample is biased?", "options": ["Only the best employee", "All shifts", "A full month", "Random selection"], "a": 0, "ex": "It does not represent the whole process."}]}, {"day": 16, "week": 3, "title": "Analyze 1: Root Cause", "chapter": "Unit 3 - Chapter 14", "explain": ["Analyze answers why the problem occurs and separates symptoms from root causes.", "Fishbone and the 5 Whys generate hypotheses, but a cause is accepted only after validation with data."], "example": "Rework is a symptom; two unclear fields become a credible cause if most returns are linked to them.", "exercise": "Draw a Fishbone and define how three possible causes will be tested.", "terms": [["Fishbone", "Cause-and-effect diagram"], ["Validation", "Confirmation using evidence"]], "quiz": [{"q": "What is a Fishbone used for?", "options": ["Organizing possible causes", "Calculating Yield", "Choosing a logo", "Closing a project"], "a": 0, "ex": "It organizes cause hypotheses."}, {"q": "When is a cause convincing?", "options": ["When supported by data", "When stated by the manager", "When it has the easiest solution", "When it cannot be measured"], "a": 0, "ex": "Evidence validates the cause."}]}, {"day": 17, "week": 3, "title": "Analyze 2: Graphical Analysis", "chapter": "Unit 3 - Chapter 14", "explain": ["A Histogram displays distribution, a Run Chart change over time, a Scatter Plot a relationship, and a Box Plot group comparison.", "Begin with the question and data type, then choose the graph that reveals trend, spread, or difference."], "example": "Use a Box Plot to compare branch processing time and a Scatter Plot for workload versus time.", "exercise": "Write four analytical questions and choose the best graph for each.", "terms": [["Histogram", "Distribution shape"], ["Scatter Plot", "Relationship between two variables"]], "quiz": [{"q": "Which chart fits temperature versus defects?", "options": ["Scatter Plot", "SIPOC", "RACI", "Pie only"], "a": 0, "ex": "Both are numeric variables."}, {"q": "What does a Histogram show?", "options": ["Distribution", "Responsibilities", "DMAIC", "Budget"], "a": 0, "ex": "It shows frequency, center, and spread."}]}, {"day": 18, "week": 3, "title": "Improve: Solution Selection and Pilot", "chapter": "Unit 3 - Chapter 15", "explain": ["Solutions are evaluated for impact, cost, time, risk, and acceptance after causes are validated.", "A pilot tests the solution on a limited scale and reveals implementation issues before full deployment."], "example": "A form redesign with automated validation may outperform training if field design causes the error.", "exercise": "Score three solutions from 1 to 5 and select the best with justification.", "terms": [["Solution Matrix", "Structured solution comparison"], ["Pilot", "Limited-scale test"]], "quiz": [{"q": "Why run a pilot?", "options": ["Test before full deployment", "Delay the project", "Remove measurement", "Prevent learning"], "a": 0, "ex": "It reduces implementation risk."}, {"q": "An expensive solution with limited impact is...", "options": ["Usually not the best", "Always selected", "Not analyzed", "A Control Plan"], "a": 0, "ex": "Balance benefit and cost."}]}, {"day": 19, "week": 3, "title": "Control: Sustaining the Improvement", "chapter": "Unit 3 - Chapter 16", "explain": ["A Control Plan defines the metric, measurement method, frequency, owner, limits, and Reaction Plan.", "Visual management and control charts help detect deviation and support handover to the Process Owner."], "example": "Weekly error measurement with a 4% warning limit and a defined action after two consecutive breaches.", "exercise": "Write a Control Plan for one metric.", "terms": [["Control Plan", "Plan for sustaining gains"], ["Reaction Plan", "Response to deviation"]], "quiz": [{"q": "What does a Control Plan include?", "options": ["Metric, owner, limit, and reaction", "Logo", "Every name", "Only the solution"], "a": 0, "ex": "It turns the solution into a managed system."}, {"q": "Why does Control follow Improve?", "options": ["To sustain the solution", "To cancel the solution", "To precede Define", "To remove ownership"], "a": 0, "ex": "It protects the new performance level."}]}, {"day": 20, "week": 3, "title": "Basic Control Charts", "chapter": "Unit 4 - Chapter 17", "explain": ["A control chart displays the center line and UCL/LCL based on natural variation.", "Common Cause belongs to the system, while a Special Cause is an unusual event requiring investigation."], "example": "A sudden time increase after a system outage indicates a Special Cause.", "exercise": "Plot 12 weeks of a metric and look for an outlier or sustained trend.", "terms": [["UCL/LCL", "Control limits"], ["Special Cause", "Unusual source of variation"]], "quiz": [{"q": "What are control limits used for?", "options": ["Distinguish natural from unusual variation", "Choose color", "SIPOC", "RACI"], "a": 0, "ex": "They reveal instability signals."}, {"q": "What is Common Cause variation?", "options": ["Natural variation in the process", "An exceptional event", "The solution", "Always a personal error"], "a": 0, "ex": "It is built into the system."}]}, {"day": 21, "week": 4, "title": "Normal Distribution and Z-score", "chapter": "Unit 4 - Chapter 18", "explain": ["The normal distribution is approximately bell-shaped and symmetric, but a Histogram and outlier review should precede a normality assumption.", "A Z-score shows the distance from the mean in standard-deviation units."], "example": "Mean 50, standard deviation 5, and value 65 gives Z=3.", "exercise": "Calculate Z for 72, 80, and 96 when the mean is 80 and standard deviation is 8.", "terms": [["Normal Distribution", "Bell-shaped probability distribution"], ["Z-score", "Distance from the mean"]], "quiz": [{"q": "What does Z=0 mean?", "options": ["The value equals the mean", "Out of control", "Two deviations above", "Cannot be measured"], "a": 0, "ex": "The distance from the mean is zero."}, {"q": "Why inspect a Histogram?", "options": ["To examine distribution shape", "To select a Sponsor", "For RPN", "For the charter"], "a": 0, "ex": "It reveals skew and outliers."}]}, {"day": 22, "week": 4, "title": "Probability and the Central Limit Theorem", "chapter": "Unit 4 - Chapter 18", "explain": ["Probability supports decisions under uncertainty and does not provide absolute certainty.", "The CLT explains that the distribution of sample means tends toward normality under suitable conditions and sample sizes."], "example": "Five cases from a busy day do not represent a full month of performance.", "exercise": "Explain why a sample of three cases is insufficient to judge a monthly process.", "terms": [["Probability", "Likelihood of an event"], ["CLT", "Central Limit Theorem"]], "quiz": [{"q": "The CLT concerns...", "options": ["Sample means", "Every value being normal", "Eliminating samples", "Defects disappearing"], "a": 0, "ex": "It focuses on the sampling distribution."}, {"q": "What is a risk of a tiny sample?", "options": ["It may not represent reality", "It is always better", "It removes bias", "It proves the cause"], "a": 0, "ex": "Unusual cases may dominate the result."}]}, {"day": 23, "week": 4, "title": "Correlation and Regression", "chapter": "Unit 4 - Chapter 19", "explain": ["Correlation coefficient r measures the strength and direction of a linear relationship, while Regression builds an equation to estimate Y from X.", "Correlation does not prove causation; a third factor may explain both variables."], "example": "Workload may correlate with delay, but staffing, request type, and system outages must also be examined.", "exercise": "Write two possible causal relationships and two misleading associations.", "terms": [["Correlation", "Strength and direction of association"], ["Regression", "Predictive relationship model"]], "quiz": [{"q": "What does r=-0.85 indicate?", "options": ["Strong negative relationship", "No relationship", "Strong positive relationship", "Nominal data"], "a": 0, "ex": "The sign gives direction and magnitude gives strength."}, {"q": "Correlation does not prove...", "options": ["Causation", "Direction", "Numbers exist", "A chart exists"], "a": 0, "ex": "A third factor may explain the association."}]}, {"day": 24, "week": 4, "title": "Non-Normal Distributions", "chapter": "Unit 5 - Chapter 20", "explain": ["Defect counts, binary outcomes, and waiting times may require non-normal distributions.", "Binomial models success/failure, Poisson event counts, and Exponential time between events."], "example": "A correct/incorrect invoice may fit Binomial, while daily complaint count may fit Poisson.", "exercise": "Classify waiting time, defect count, pass/fail, and weight by data type.", "terms": [["Binomial", "Binary outcomes"], ["Poisson", "Event counts"]], "quiz": [{"q": "Binomial fits...", "options": ["Success/failure", "Continuous temperature", "Color", "Text"], "a": 0, "ex": "It handles binary outcomes."}, {"q": "Poisson fits...", "options": ["Event counts over time", "Mean only", "SIPOC", "A team"], "a": 0, "ex": "For example, complaints per day."}]}, {"day": 25, "week": 4, "title": "Hypothesis Testing: H0 and p-value", "chapter": "Unit 5 - Chapter 21", "explain": ["H0 usually states no difference or effect, while Ha states a difference or effect.", "If the p-value is less than or equal to alpha, reject H0; this is a probabilistic decision, not absolute certainty."], "ex function txt(id,k){if($(id))$(id).textContent=u(k)}function apply(){document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';txt('title','title');txt('subtitle','subtitle');$('langBtn').textContent=lang==='ar'?'🌐 English':'🌐 العربية';$('langBtn').title=lang==='ar'?'Switch to English':'التحويل إلى العربية';txt('darkBtn',document.body.classList.contains('dark')?'light':'dark');txt('installBtn','install');let items=[['dash','dash'],['lessons','lessons'],['weekly','weekly'],['lab','lab'],['templates','templates'],['gloss','glossary'],['cards','cards'],['final','final']];$('nav').innerHTML=items.map(x=>`<button data-tab="${x[0]}" onclick="tab('${x[0]}')">${u(x[1])}</button>`).join('');document.querySelector(`[data-tab="${document.querySelector('section.active')?.id||'dash'}"]`)?.classList.add('active');txt('progressTitle','progress');txt('startBtn','start');txt('resetBtn','reset');txt('printBtn','print');txt('methodTitle','method');$('steps').innerHTML=u('steps').map(x=>`<li>${x}</li>`).join('');txt('planTitle','plan');txt('prevBtn','prev');txt('nextBtn','next');$('weekBtn').textContent=u('weekly');txt('weeklyTitle','weekly');$('weekButtons').innerHTML=[1,2,3,4].map(w=>`<button class="primary" onclick="renderWeekly(${w})">${u('week')} ${w}</button>`).join('');document.querySelectorAll('.calcBtn').forEach(x=>x.textContent=u('calc'));$('search').placeholder=u('search');txt('cardHint','cardHint');txt('cardPrev','prev');txt('cardNext','next');txt('shuffleBtn','shuffle');txt('finalTitle','final');txt('finalIntro','finalIntro');txt('finalStart','startFinal');renderCalendar();renderSelect();renderLesson(day,false);renderFormulas();renderGloss();renderTemplates();renderCard();calcSigma();calcRpn();calcHyp();calcCopq()}
function toggleLang(){lang=lang==='ar'?'en':'ar';localStorage.setItem('ss_lang',lang);apply()}function tab(id){document.querySelectorAll('main section').forEach(x=>x.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('nav button').forEach(x=>x.classList.toggle('active',x.dataset.tab===id));if(id==='lessons')renderLesson(day);if(id==='cert')window.scrollTo({top:0,behavior:'smooth'})}
function done(d){return localStorage.getItem('ss_done_'+d)==='1'}function setDone(d,v){localStorage.setItem('ss_done_'+d,v?'1':'0');renderCalendar()}function resetProgress(){if(confirm(u('resetq'))){for(let i=1;i<=30;i++)localStorage.removeItem('ss_done_'+i);renderCalendar();renderLesson(day,false)}}function renderCalendar(){let n=ls().filter(x=>done(x.day)).length,p=Math.round(n/30*100);$('progressText').textContent=n+' '+u('completed');$('progressPct').textContent=p+'%';$('progressFill').style.width=p+'%';$('calendar').innerHTML=ls().map(x=>`<button class="dayBtn ${done(x.day)?'done':''} ${x.day===day?'current':''}" onclick="day=${x.day};localStorage.setItem('ss_day',day);tab('lessons')"><span class="dayNum">${u('day')} ${x.day}</span><small>${x.title}</small></button>`).join('')}
function renderSelect(){$('lessonSelect').innerHTML=ls().map(x=>`<option value="${x.day}">${u('day')} ${x.day} - ${x.title}</option>`).join('');$('lessonSelect').value=day}function renderLesson(d=day,scroll=true){day=d;localStorage.setItem('ss_day',day);let l=ls().find(x=>x.day===d);$('lessonSelect').value=d;$('lessonView').innerHTML=`<div class="card" style="margin-top:15px"><div class="row between"><div><div class="muted">${l.chapter}</div><h2>${u('day')} ${l.day}: ${l.title}</h2></div><label class="noPrint"><input type="checkbox" ${done(d)?'checked':''} onchange="setDone(${d},this.checked)"> ${u('done')}</label></div><h3>${u('objectives')}</h3><ul>${l.explain.map(x=>`<li>${x}</li>`).join('')}</ul><h3>${u('terms')}</h3>${l.terms.map(x=>`<span class="term" title="${x[1]}">${x[0]}</span>`).join('')}<div class="callout blueCall"><strong>${u('example')}:</strong><br>${l.example}</div><div class="callout"><strong>${u('exercise')}:</strong><br>${l.exercise}</div><h3>${u('quiz')}</h3><div id="lessonQuiz"></div><button class="primary noPrint" onclick="grade('lessonQuiz',ls().find(x=>x.day===day).quiz)">${u('grade')}</button></div>`;questions('lessonQuiz',l.quiz,'d'+d);renderCalendar();if(scroll)window.scrollTo({top:0,behavior:'smooth'})}function prevLesson(){renderLesson(Math.max(1,day-1))}function nextLesson(){renderLesson(Math.min(30,day+1))}
function questions(id,qs,prefix){$(id).innerHTML=qs.map((q,i)=>`<div class="q"><strong>${i+1}. ${q.q}</strong>${q.options.map((o,j)=>`<label><input type="radio" name="${prefix}_${i}" value="${j}"> ${o}</label>`).join('')}<div class="result"></div></div>`).join('')}function grade(id,qs){let box=$(id),s=0;qs.forEach((q,i)=>{let b=box.querySelectorAll('.q')[i],name=b.querySelector('input').name,p=b.querySelector(`input[name="${name}"]:checked`),r=b.querySelector('.result');if(p&&+p.value===q.a){s++;r.innerHTML=`<span class="ok">${u('correct')}.</span> ${q.ex}`}else r.innerHTML=`<span class="bad">${u('wrong')}.</span> <strong>${q.options[q.a]}</strong>. ${q.ex}`});let old=box.parentElement.querySelector('.scoreBox');if(old)old.remove();let d=document.createElement('div');d.className='callout scoreBox';d.innerHTML=`<strong>${u('score')}: ${s}/${qs.length} (${Math.round(s/qs.length*100)}%)</strong>`;box.parentElement.appendChild(d)}function renderWeekly(w){dyn=[];ls().filter(x=>x.week===w).forEach(x=>dyn.push(...x.quiz));$('weeklyExam').innerHTML=`<div class="card" style="margin-top:15px"><h2>${u('week')} ${w}</h2><div id="weekQs"></div><button class="primary noPrint" onclick="grade('weekQs',dyn)">${u('grade')}</button></div>`;questions('weekQs',dyn,'w'+w+Date.now())}function shuffle(a){return [...a].sort(()=>Math.random()-.5)}function renderFinal(){let q=[];ls().forEach(x=>q.push(...x.quiz));q.push(...COURSE[lang].extras);dyn=shuffle(q).slice(0,50);$('finalExam').innerHTML=`<div class="card" style="margin-top:15px"><div id="finalQs"></div><button class="primary noPrint" onclick="grade('finalQs',dyn)">${u('grade')}</button></div>`;questions('finalQs',dyn,'f'+Date.now())}
function calcSigma(){let o=+$('opp').value,d=+$('def').value;if(!o||d<0||d>o){$('sigmaOut').textContent=lang==='ar'?'تحقق من القيم.':'Check the values.';return}let y=(o-d)/o*100,dp=d/o*1e6,s=dp<=3.4?'6':dp<=233?'5-6':dp<=6210?'4-5':dp<=66800?'3-4':dp<=308000?'2-3':dp<=690000?'1-2':'<1';$('sigmaOut').innerHTML=`Yield=<strong>${y.toFixed(3)}%</strong><br>DPMO=<strong>${dp.toFixed(1)}</strong><br>Sigma≈<strong>${s}</strong>`}function calcRpn(){$('rpnOut').innerHTML='RPN=<strong>'+((+$('sev').value)*(+$('occ').value)*(+$('det').value))+'</strong>'}function calcHyp(){let p=+$('pval').value,a=+$('alpha').value;$('hypOut').innerHTML=p<=a?(lang==='ar'?'<strong>نرفض H0</strong>: توجد دلالة إحصائية.':'<strong>Reject H0</strong>: statistically significant.'):(lang==='ar'?'<strong>لا نرفض H0</strong>: الدليل غير كافٍ.':'<strong>Fail to reject H0</strong>: insufficient evidence.')}function calcCopq(){let x=(+$('scrap').value||0)+(+$('rework').value||0)+(+$('warranty').value||0);$('copqOut').innerHTML='CoPQ=<strong>'+x.toLocaleString(lang==='ar'?'ar-SA':'en-US')+'</strong>'}

function renderCard(){let f=FLASH[lang],x=f[cardIndex%f.length];$('flash').innerHTML=flipped?`<div>${x[1]}<br><small>${u('cardHint')}</small></div>`:`<div>${x[0]}<br><small>${u('cardHint')}</small></div>`;$('cardCount').textContent=(cardIndex+1)+' / '+f.length}function flipCard(){flipped=!flipped;renderCard()}function nextCard(){cardIndex=(cardIndex+1)%FLASH[lang].length;flipped=false;renderCard()}function prevCard(){cardIndex=(cardIndex-1+FLASH[lang].length)%FLASH[lang].length;flipped=false;renderCard()}function shuffleCards(){FLASH[lang].sort(()=>Math.random()-.5);cardIndex=0;flipped=false;renderCard()}
